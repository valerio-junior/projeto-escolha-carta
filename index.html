<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Magica - escolha carta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stage">
        <h1 id="status-text">O Mágico está pronto...</h1>
        
        <div class="main-area">
            <div class="deck-wrapper">
                <img src="assets/mao.jpg" alt="Mão" class="hand-img">
                <div id="deck" class="deck-fan"></div>
            </div>

            <div class="magician-container">
                <div id="magician-card" class="magician-card">
                    <div class="face front">
                        <img src="assets/magico-de-frente.jpg" alt="Mágico Frente">
                    </div>
                    <div class="face back">
                        <img src="assets/magico-de-costas.jpg" alt="Mágico Costas">
                    </div>
                </div>
                <div id="slot"></div>
            </div>
        </div>

        <button id="btn-action">Iniciar Truque</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
